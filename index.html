<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>南一超強字彙2500</title>
</head>
<body>

<h1>南一超強字彙2500</h1>

<div id="musicList"></div>

<script>
const musicList = document.getElementById("musicList");

for (let i = 1; i <= 75; i++) {
    const num = String(i).padStart(3, "0");

    const p = document.createElement("p");
    p.textContent = `第${num}首曲目`;

    const audio = document.createElement("audio");
    audio.controls = true;
    audio.src = `${num}.mp3`;

    musicList.appendChild(p);
    musicList.appendChild(audio);
    musicList.appendChild(document.createElement("br"));
    musicList.appendChild(document.createElement("br"));
}
</script>

</body>
</html>
